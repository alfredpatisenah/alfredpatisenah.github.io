        position: Advanced Microbiology Scientist
        location: Jakarta, Indonesia
        start_date: 2024-07
        end_date: present
        highlights:
          - Evaluated medical devices and methods for culture-based identification, antimicrobial susceptibility testing, and 17 NAATs.
          - Managed the training program for lab technologists on newly launched tests.
          - Collaborated with international partner to bring gut microbiome testing to Indonesia.
          - Developed a Python pipeline for automated qPCR analysis, improving interpretation efficiency.
      - company: Tim Olimpiade Biologi Indonesia
        position: Scientific Committee Member
        location: Bandung, Indonesia
        start_date: 2018
        end_date: present
        highlights:
          - Collaborated with experts and the ministry of education to hold national biology olympiad with over 20,000 participants.
          - Spearheaded the formation of Indonesian biology olympiad alumni community to educate impoverished students.
      - company: Institut Teknologi Bandung
